services:
  asado-api:
    build: .
    container_name: asado-api
    restart: unless-stopped
    env_file: .env
    ports:
      # Bind to the VM's LAN/Tailscale IP only (set HOST_IP in .env), not 0.0.0.0.
      # Falls back to all interfaces if HOST_IP is unset — set it for LAN-only safety.
      - "${HOST_IP:-0.0.0.0}:8787:8787"

# DB note: this connects to your existing Postgres LXC via DATABASE_URL in .env.
# If you ever want a fully self-contained stack, add a `postgres` service here and
# point DATABASE_URL at it — but reusing the PG LXC keeps your databases centralized.
